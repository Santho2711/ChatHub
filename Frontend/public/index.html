<!DOCTYPE html>

  <head>

    <meta name="theme-color" content="#25D366" />
    <meta
      name="description"
      content="A modern WhatsApp Web-like chat application built with React.js and Zustand"
    />
    <link rel="shortcut icon" href="./chat.png" type="image/x-icon">
